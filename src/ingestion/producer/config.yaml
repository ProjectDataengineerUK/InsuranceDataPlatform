kafka:
  bootstrap_servers_env: "CONFLUENT_BOOTSTRAP_SERVERS"
  api_key_env: "CONFLUENT_API_KEY"
  api_secret_env: "CONFLUENT_API_SECRET"

topics:
  claim_opened: "claim-opened"
  policy_created: "policy-created"
  customer_updated: "customer-updated"

sources:
  susep:
    enabled: true
    # Microdados reais de sinistros (não agregados) — layout confirmado em
    # Dados_AUTO.pdf. Arquivo semestral (~2.45M linhas); sample_rows evita
    # tentar processar tudo de uma vez numa demo.
    dataset_url: "https://dadosabertos.susep.gov.br/dadosabertos/auto_apos_2006/S_AUTO_2020B.zip"
    dataset_path: "data/susep_sinistros.csv"
    event_topic: "claim_opened"
    sample_rows: 2000
  ans:
    enabled: true
    # Dados reais de movimentação de beneficiários, um estado por vez (arquivo
    # nacional inteiro seria muito grande para uma demo). Troque AC por outra
    # UF em: https://dadosabertos.ans.gov.br/FTP/PDA/dados_de_beneficiarios_por_operadora/
    dataset_url: "https://dadosabertos.ans.gov.br/FTP/PDA/dados_de_beneficiarios_por_operadora/sib_ativo_AC.zip"
    dataset_path: "data/ans_dados.csv"
    event_topic: "policy_created"
    sample_rows: 2000
  open_insurance:
    enabled: false  # fast-follow — depende de credenciamento no sandbox Open Insurance Brasil
    dataset_path: "data/open_insurance.json"
    event_topic: "customer_updated"

replay:
  events_per_minute: 100
  shuffle: true
  loop: true
