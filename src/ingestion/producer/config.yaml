kafka:
  bootstrap_servers_env: "CONFLUENT_BOOTSTRAP_SERVERS"
  api_key_env: "CONFLUENT_API_KEY"
  api_secret_env: "CONFLUENT_API_SECRET"

topics:
  claim_opened: "claim-opened"
  policy_created: "policy-created"
  customer_updated: "customer-updated"

sources:
  susep:
    enabled: true
    # Dataset AGREGADO (sistema AUTOSEG) — dados sintéticos calibrados nele, ver
    # src/ingestion/producer/datasets/susep_loader.py. Resolver o CSV mais recente
    # em: https://www.gov.br/susep/pt-br/central-de-conteudos/dados-estatisticos/bases-anonimizadas
    dataset_url: ""
    dataset_path: "data/susep_sinistros.csv"
    event_topic: "claim_opened"
    reference_period_start: "2024-01-01T00:00:00"
    reference_period_end: "2024-06-30T23:59:59"
  ans:
    enabled: true
    # Dataset real por linha (movimentação de beneficiários) — confirmado via
    # dicionario_de_dados_sib.ods. FTP público: https://dadosabertos.ans.gov.br/FTP/PDA/dados_de_beneficiarios_por_operadora/
    # (resolver o arquivo do ano/mês mais recente dentro dessa pasta)
    dataset_url: ""
    dataset_path: "data/ans_dados.csv"
    event_topic: "policy_created"
  open_insurance:
    enabled: false  # fast-follow — depende de credenciamento no sandbox Open Insurance Brasil
    dataset_path: "data/open_insurance.json"
    event_topic: "customer_updated"

replay:
  events_per_minute: 100
  shuffle: true
  loop: true
