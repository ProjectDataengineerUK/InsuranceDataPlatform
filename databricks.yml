bundle:
  name: insurance-lakehouse-platform

include:
  - resources/*.yml

variables:
  catalog:
    description: Nome do catálogo Unity Catalog do ambiente

# Os arquivos em src/ são sincronizados como Workspace Files pelo próprio DAB
# (sync automático da raiz do bundle) — não há empacotamento em wheel neste
# estágio; os jobs referenciam os .py diretamente via spark_python_task.

# workspace.host não é declarado: o Databricks CLI lê DATABRICKS_HOST/
# DATABRICKS_TOKEN diretamente do ambiente (já setados pelo deploy.yml),
# não há sintaxe ${VAR} de shell suportada aqui — "${DATABRICKS_HOST}"
# literal quebrava o deploy (confirmado no terceiro deploy real).
# run_as via service principal fica para quando migrarmos de PAT pessoal
# para service principals dedicados por ambiente (ver docs/ARCHITECTURE.md).
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: insurance_dev

  staging:
    mode: production
    variables:
      catalog: insurance_staging

  prod:
    mode: production
    variables:
      catalog: insurance_prod
