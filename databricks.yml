bundle:
  name: insurance-lakehouse-platform

include:
  - resources/*.yml

variables:
  catalog:
    description: Nome do catálogo Unity Catalog do ambiente
  sql_warehouse_id:
    description: >-
      ID do Serverless SQL Warehouse (terraform/warehouse.tf), consumido só pelo
      app insurance_platform_app em prod (ver resources/visualization.yml).
      Passado via `--var` no deploy-prod, resolvido a partir de
      `terraform output -raw sql_warehouse_id` — vazio em dev/staging, onde o
      app não é deployado.
    default: ""

# Os arquivos em src/ são sincronizados como Workspace Files pelo próprio DAB
# (sync automático da raiz do bundle) — não há empacotamento em wheel neste
# estágio; os jobs referenciam os .py diretamente via spark_python_task.

# workspace.host não é declarado: o Databricks CLI lê DATABRICKS_HOST/
# DATABRICKS_TOKEN diretamente do ambiente (já setados pelo deploy.yml),
# não há sintaxe ${VAR} de shell suportada aqui — "${DATABRICKS_HOST}"
# literal quebrava o deploy (confirmado no terceiro deploy real).
# run_as via service principal fica para quando migrarmos de PAT pessoal
# para service principals dedicados por ambiente (ver docs/ARCHITECTURE.md).
targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: insurance_dev
    # Workspace trial: cota de serverless compute estoura com dev + prod
    # rodando os mesmos jobs em paralelo (RESOURCE_EXHAUSTED confirmado num
    # deploy real). Os jobs declaram pause_status: UNPAUSED explicitamente
    # (pra sobrepor o default de development mode), então só dá pra manter
    # dev parado sobrepondo de volta aqui. Todos os 4 abaixo agora são
    # schedule, não continuous (ver resources/jobs.bronze.yml/jobs.silver.yml/
    # jobs.regulatory_bronze.yml/jobs.fraud_score.yml) — a chave do override
    # precisa bater com o tipo de trigger declarado na base, senão o bundle
    # não aplica o pause.
    resources:
      jobs:
        bronze_ingest:
          schedule:
            pause_status: PAUSED
        silver_transform:
          schedule:
            pause_status: PAUSED
        fraud_score_stream:
          # schedule, não continuous, desde 2026-07-13 (ver resources/jobs.fraud_score.yml).
          schedule:
            pause_status: PAUSED
        regulatory_bronze_ingest:
          schedule:
            pause_status: PAUSED

  staging:
    mode: production
    workspace:
      # mode: production exige um root_path explícito (evita depender do
      # default por-usuário que development usa) — mesmo workspace/PAT do
      # dev, só muda o catálogo Unity Catalog.
      root_path: /Workspace/Users/jonataslimacostabr@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: insurance_staging

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/jonataslimacostabr@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: insurance_prod
    # Mesmo só com prod rodando (dev já pausado), os jobs contínuos ainda
    # estouravam a cota de serverless do workspace trial (RESOURCE_EXHAUSTED
    # confirmado) — sintoma real observado em 2026-07-14: Bronze/Silver
    # parados por ~15h na Visão Geral do app enquanto o producer continuava
    # publicando normalmente. bronze_ingest, silver_transform e
    # regulatory_bronze_ingest convertidos de continuous pra schedule nessa
    # data (mesmo padrão já usado em fraud_score_stream desde 2026-07-13) —
    # nenhum job contínuo restante neste bundle.
