resources:
  jobs:
    regulatory_pipeline:
      name: insurance-regulatory-pipeline-${bundle.target}
      schedule:
        quartz_cron_expression: "0 */30 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED

      # standardize -> reconcile -> gold_export, batch (spark.read.table, sem
      # streaming/checkpoint) — lê de bronze.regulatory_claims_raw, populado
      # continuamente pelo job regulatory_bronze_ingest.
      tasks:
        - task_key: standardize
          environment_key: default
          spark_python_task:
            python_file: ../src/regulatory/standardize.py
            parameters:
              - "--bronze-table"
              - "${var.catalog}.bronze.regulatory_claims_raw"
              - "--silver-table"
              - "${var.catalog}.silver.regulatory_claims"
              - "--results-table"
              - "${var.catalog}.monitoring._dq_results"

        - task_key: reconcile
          environment_key: default
          depends_on:
            - task_key: standardize
          spark_python_task:
            python_file: ../src/regulatory/reconcile.py
            parameters:
              - "--silver-table"
              - "${var.catalog}.silver.regulatory_claims"
              - "--results-table"
              - "${var.catalog}.monitoring._regulatory_reconciliation_results"

        - task_key: gold_export
          environment_key: default
          depends_on:
            - task_key: reconcile
          spark_python_task:
            python_file: ../src/regulatory/gold_susep_export.py
            parameters:
              - "--silver-table"
              - "${var.catalog}.silver.regulatory_claims"
              - "--dq-results-table"
              - "${var.catalog}.monitoring._dq_results"
              - "--reconciliation-results-table"
              - "${var.catalog}.monitoring._regulatory_reconciliation_results"
              - "--gold-claims-table"
              - "${var.catalog}.gold.regulatory_susep_claims"
              - "--gold-summary-table"
              - "${var.catalog}.gold.regulatory_dq_summary"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - requests
