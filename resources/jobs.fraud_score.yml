resources:
  jobs:
    fraud_score_stream:
      name: insurance-fraud-score-stream-${bundle.target}
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1

      # Contínuo e desacoplado do agregado Gold (que roda a cada 10 min) para
      # atender ao Success Criteria original do DEFINE: score de fraude
      # visível em < 1 min. Trigger de 30s dá folga sobre esse alvo.
      tasks:
        - task_key: fraud_score_claims
          environment_key: default
          spark_python_task:
            python_file: ../src/fraud/streaming_gold.py
            parameters:
              - "--silver-table"
              - "${var.catalog}.silver.claims"
              - "--gold-claims-table"
              - "${var.catalog}.gold.claims"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/gold/_checkpoints/claims"
              - "--results-table"
              - "${var.catalog}.monitoring._dq_results"
              - "--experiment-name"
              # Mesmo experimento usado por jobs.ml_training.yml — localiza o run
              # champion pra shadow scoring (coluna model_fraud_score em
              # gold.claims, não influencia auto_approved/fraud_flag).
              - "/Users/${workspace.current_user.userName}/insurance-fraud-detection-${bundle.target}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              # scikit-learn: necessário pro mlflow.pyfunc.spark_udf carregar/
              # aplicar o modelo do champion (shadow scoring).
              - scikit-learn
