resources:
  jobs:
    fraud_score_stream:
      name: insurance-fraud-score-stream-${bundle.target}
      # Era continuous — trocado pra schedule em 2026-07-13: com
      # bronze_ingest/silver_transform/fraud_score_stream todos continuous
      # disputando a mesma cota apertada de serverless, este job ficava
      # preso processando exatamente 1 versão do Delta por execução antes
      # de ser reciclado (confirmado inspecionando offsets/0,1,2 do
      # checkpoint: reservoirVersion 1→2→3 ao longo de 5h, enquanto
      # silver.claims já tinha 35133 linhas) — nunca alcançava o estado
      # atual da tabela. Agendado dá a cada execução uma janela de compute
      # dedicada pra esvaziar o backlog de uma vez, sem competir por
      # capacidade continuamente. Troca o alvo de latência original do
      # DEFINE (< 1 min) por um SLA mais realista (~5 min) — melhor do que
      # o continuous não estava entregando de verdade nesta cota.
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED
      max_concurrent_runs: 1

      tasks:
        - task_key: fraud_score_claims
          environment_key: default
          spark_python_task:
            python_file: ../src/fraud/streaming_gold.py
            parameters:
              - "--silver-table"
              - "${var.catalog}.silver.claims"
              - "--gold-claims-table"
              - "${var.catalog}.gold.claims"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/gold/_checkpoints/claims"
              - "--results-table"
              - "${var.catalog}.monitoring._dq_results"
              - "--experiment-name"
              # Mesmo experimento usado por jobs.ml_training.yml — localiza o run
              # champion pra shadow scoring (coluna model_fraud_score em
              # gold.claims, não influencia auto_approved/fraud_flag).
              - "/Users/${workspace.current_user.userName}/insurance-fraud-detection-${bundle.target}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              # scikit-learn: necessário pro mlflow.pyfunc.spark_udf carregar/
              # aplicar o modelo do champion (shadow scoring).
              - scikit-learn
