# Camada de visualização (INSURANCE_VISUALIZATION_LAYER) — ver
# DESIGN_INSURANCE_VISUALIZATION_LAYER.md, Decision 1: definida dentro de
# targets.prod.resources (não no nível de topo, que é global a todos os
# targets) — é o mecanismo suportado pelo Databricks Asset Bundles pra um
# recurso existir só num target específico. `databricks bundle validate -t
# dev` não deve mostrar nada deste arquivo.
#
# O AI/BI Dashboard (Decision 4 do DESIGN) ainda não entra aqui: é
# prototipado interativamente na UI do workspace prod e só depois capturado
# via `databricks bundle generate dashboard --existing-id <id>` — não existe
# um `.lvdash.json` pra referenciar ainda. Ver README.md "Ativando a camada
# de visualização" pro passo a passo completo; o bloco `dashboards:` entra
# neste arquivo assim que esse comando rodar pela primeira vez.
#
# Genie Space ("Insurance Claims and Compliance Analytics", criado
# manualmente na UI em 2026-07-14, apontando só pras tabelas gold/monitoring
# já usadas no resto do app — nunca bronze/silver com dado bruto) entra
# abaixo como um resource do app (pages/chat.py), não como
# `resources.genie_spaces` no nível do bundle — referenciamos o space_id
# existente diretamente (mesmo padrão do `sql-warehouse` abaixo, que também
# referencia um recurso pré-provisionado por id, não criado pelo bundle).
targets:
  prod:
    resources:
      apps:
        insurance_platform_app:
          name: insurance-platform-app
          source_code_path: ../apps/insurance_platform_app
          resources:
            - name: "sql-warehouse"
              sql_warehouse:
                id: ${var.sql_warehouse_id}
                # CAN_USE (não CAN_MANAGE) — o app só precisa rodar queries,
                # nunca administrar o warehouse. Confirmar o enum exato de
                # `permission` aceito aqui via `databricks bundle schema` no
                # primeiro deploy real, já que só CAN_MANAGE foi confirmado
                # em exemplo oficial durante o Design.
                permission: "CAN_USE"
            # Metrics API do Confluent Cloud (consumer lag/partition skew na
            # página Performance) — os 3 secrets são criados sempre (mesmo com
            # string_value vazia) em terraform/secrets.tf, então essa
            # declaração nunca referencia um secret inexistente mesmo antes do
            # usuário configurar os GitHub secrets correspondentes. Schema do
            # tipo `secret` (scope/key/permission) ainda não confirmado num
            # deploy real — mesma ressalva já feita acima pro sql-warehouse.
            - name: "confluent-metrics-api-key"
              secret:
                scope: "insurance-platform"
                key: "confluent-metrics-api-key"
                permission: "READ"
            - name: "confluent-metrics-api-secret"
              secret:
                scope: "insurance-platform"
                key: "confluent-metrics-api-secret"
                permission: "READ"
            - name: "confluent-cluster-id"
              secret:
                scope: "insurance-platform"
                key: "confluent-cluster-id"
                permission: "READ"
            # Chat em linguagem natural (pages/chat.py) — CAN_RUN (não
            # CAN_MANAGE/CAN_EDIT): o app só precisa submeter perguntas e ler
            # respostas, nunca administrar o Space. Schema do tipo
            # `genie_space` (name/space_id/permission) ainda não confirmado
            # num deploy real — mesma ressalva já feita acima pro
            # sql-warehouse e pros secrets.
            - name: "genie-space"
              genie_space:
                name: "Insurance Claims and Compliance Analytics"
                space_id: "01f17fa3095e10848645c8a1cea37291"
                permission: "CAN_RUN"
