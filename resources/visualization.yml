# Camada de visualização (INSURANCE_VISUALIZATION_LAYER) — ver
# DESIGN_INSURANCE_VISUALIZATION_LAYER.md, Decision 1: definida dentro de
# targets.prod.resources (não no nível de topo, que é global a todos os
# targets) — é o mecanismo suportado pelo Databricks Asset Bundles pra um
# recurso existir só num target específico. `databricks bundle validate -t
# dev` não deve mostrar nada deste arquivo.
#
# O AI/BI Dashboard e o Genie Space (Decision 4 do DESIGN) ainda não entram
# aqui: ambos são prototipados interativamente na UI do workspace prod e só
# depois capturados via `databricks bundle generate dashboard --existing-id
# <id>` / `databricks bundle generate genie-space --existing-id <id>` — não
# existe um `.lvdash.json`/definição de Genie pra referenciar ainda. Ver
# README.md "Ativando a camada de visualização" pro passo a passo completo;
# os blocos `dashboards:`/`genie_spaces:` entram neste arquivo assim que
# esses comandos rodarem pela primeira vez.
targets:
  prod:
    resources:
      apps:
        insurance_platform_app:
          name: insurance-platform-app
          source_code_path: ../apps/insurance_platform_app
          resources:
            - name: "sql-warehouse"
              sql_warehouse:
                id: ${var.sql_warehouse_id}
                # CAN_USE (não CAN_MANAGE) — o app só precisa rodar queries,
                # nunca administrar o warehouse. Confirmar o enum exato de
                # `permission` aceito aqui via `databricks bundle schema` no
                # primeiro deploy real, já que só CAN_MANAGE foi confirmado
                # em exemplo oficial durante o Design.
                permission: "CAN_USE"
