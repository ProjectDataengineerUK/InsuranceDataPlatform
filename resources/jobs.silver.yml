resources:
  jobs:
    silver_transform:
      name: insurance-silver-transform-${bundle.target}
      # Era continuous — convertido pra schedule em 2026-07-14 junto com
      # bronze_ingest/regulatory_bronze_ingest (ver resources/jobs.bronze.yml
      # pro racional completo). Offset de +2min em relação a bronze_ingest
      # (que roda em */5min) pra dar tempo do Bronze escrever antes da Silver
      # tentar ler o mesmo intervalo.
      schedule:
        quartz_cron_expression: "0 2-59/5 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED
      max_concurrent_runs: 1

      # Workspace trial só permite compute serverless — environment_key obrigatório.
      tasks:
        - task_key: silver_claims
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/silver_transform.py
            parameters:
              - "--bronze-table"
              - "${var.catalog}.bronze.claims"
              - "--silver-table"
              - "${var.catalog}.silver.claims"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/silver/_checkpoints/claims"
              - "--key-column"
              - "claim_id"
              - "--results-table"
              - "${var.catalog}.monitoring._dq_results"

        - task_key: silver_policies
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/silver_transform.py
            parameters:
              - "--bronze-table"
              - "${var.catalog}.bronze.policies"
              - "--silver-table"
              - "${var.catalog}.silver.policies"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/silver/_checkpoints/policies"
              - "--key-column"
              - "policy_id"
              - "--results-table"
              - "${var.catalog}.monitoring._dq_results"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
