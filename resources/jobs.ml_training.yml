resources:
  jobs:
    fraud_model_training:
      name: insurance-fraud-model-training-${bundle.target}
      schedule:
        # Roda 30 min depois de cada checagem do model_drift_monitor (ver
        # jobs.model_monitoring.yml, cron "0 0 */6 * * ?") — o próprio
        # train_model.py decide se retreina de verdade lendo o resultado mais
        # recente de monitoring._model_drift_results (sem drift, só loga e
        # sai; ver should_retrain).
        quartz_cron_expression: "0 30 */6 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED

      # Workspace trial só permite compute serverless — environment_key obrigatório.
      tasks:
        - task_key: train_fraud_model
          environment_key: default
          spark_python_task:
            python_file: ../src/fraud/train_model.py
            parameters:
              - "--gold-claims-table"
              - "${var.catalog}.gold.claims"
              - "--experiment-name"
              # mlflow.set_experiment() com tracking_uri="databricks" exige um
              # caminho absoluto no workspace — um nome solto (ex.:
              # "insurance-fraud-detection-dev") é rejeitado pela API com
              # INVALID_PARAMETER_VALUE.
              - "/Users/${workspace.current_user.userName}/insurance-fraud-detection-${bundle.target}"
              - "--drift-results-table"
              - "${var.catalog}.monitoring._model_drift_results"
              - "--feature-baseline-table"
              - "${var.catalog}.monitoring._feature_baseline"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
