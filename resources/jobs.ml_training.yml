resources:
  jobs:
    fraud_model_training:
      name: insurance-fraud-model-training-${bundle.target}
      schedule:
        quartz_cron_expression: "0 0 3 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED

      # Workspace trial só permite compute serverless — environment_key obrigatório.
      tasks:
        - task_key: train_fraud_model
          environment_key: default
          spark_python_task:
            python_file: ../src/fraud/train_model.py
            parameters:
              - "--gold-claims-table"
              - "${var.catalog}.gold.claims"
              - "--experiment-name"
              - "insurance-fraud-detection-${bundle.target}"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            dependencies:
              - scikit-learn
