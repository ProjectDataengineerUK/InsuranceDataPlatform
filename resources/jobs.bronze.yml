resources:
  jobs:
    bronze_ingest:
      name: insurance-bronze-ingest-${bundle.target}
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1

      # Workspace trial só permite compute serverless — cada task referencia
      # environment_key (obrigatório para spark_python_task em serverless).
      tasks:
        - task_key: bronze_claims
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "claim-opened"
              - "--bronze-table"
              - "${var.catalog}.bronze.claims"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/claim-opened"

        - task_key: bronze_policies
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "policy-created"
              - "--bronze-table"
              - "${var.catalog}.bronze.policies"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/policy-created"

        - task_key: bronze_customers
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "customer-updated"
              - "--bronze-table"
              - "${var.catalog}.bronze.customers"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/customer-updated"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            # confluent-kafka: usado por kafka_lag_reporter.py (commit
            # administrativo de offsets pra consumer lag monitoring externo,
            # ver docs/ARCHITECTURE.md) — não vem por padrão no ambiente
            # serverless.
            dependencies:
              - confluent-kafka==2.5.0
