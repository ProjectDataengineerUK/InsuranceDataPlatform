resources:
  jobs:
    bronze_ingest:
      name: insurance-bronze-ingest-${bundle.target}
      # Era continuous — convertido pra schedule em 2026-07-14, mesmo padrão
      # já aplicado em fraud_score_stream em 2026-07-13 (ver
      # resources/jobs.fraud_score.yml): a Visão Geral do app mostrou Bronze/
      # Silver parados por ~15h enquanto o producer (GitHub Actions)
      # continuava publicando normalmente — os 3 jobs continuous restantes
      # (este, silver_transform, regulatory_bronze_ingest) disputando a mesma
      # cota apertada de serverless em prod é a causa mais provável (mesmo
      # RESOURCE_EXHAUSTED já documentado). trigger(availableNow=True) já
      # embutido em bronze_ingest.py processa tudo desde o último checkpoint
      # e termina sozinho — a troca é só configuração de job, sem mudança de
      # código (mesma lógica de resources/jobs.open_insurance.yml).
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED
      max_concurrent_runs: 1

      # Workspace trial só permite compute serverless — cada task referencia
      # environment_key (obrigatório para spark_python_task em serverless).
      tasks:
        - task_key: bronze_claims
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "claim-opened"
              - "--bronze-table"
              - "${var.catalog}.bronze.claims"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/claim-opened"

        - task_key: bronze_policies
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "policy-created"
              - "--bronze-table"
              - "${var.catalog}.bronze.policies"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/policy-created"

        - task_key: bronze_customers
          environment_key: default
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "customer-updated"
              - "--bronze-table"
              - "${var.catalog}.bronze.customers"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/customer-updated"

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
            # confluent-kafka: usado por kafka_lag_reporter.py (commit
            # administrativo de offsets pra consumer lag monitoring externo,
            # ver docs/ARCHITECTURE.md) — não vem por padrão no ambiente
            # serverless.
            dependencies:
              - confluent-kafka==2.5.0
