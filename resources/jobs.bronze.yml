resources:
  jobs:
    bronze_ingest:
      name: insurance-bronze-ingest-${bundle.target}
      continuous:
        pause_status: UNPAUSED
      max_concurrent_runs: 1

      # Workspace trial só permite compute serverless — nenhuma task declara
      # job_cluster_key/new_cluster, o Databricks aloca serverless automático.
      tasks:
        - task_key: bronze_claims
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "claim-opened"
              - "--bronze-table"
              - "${var.catalog}.bronze.claims"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/claim-opened"

        - task_key: bronze_policies
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "policy-created"
              - "--bronze-table"
              - "${var.catalog}.bronze.policies"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/policy-created"

        - task_key: bronze_customers
          spark_python_task:
            python_file: ../src/streaming/bronze_ingest.py
            parameters:
              - "--topic"
              - "customer-updated"
              - "--bronze-table"
              - "${var.catalog}.bronze.customers"
              - "--checkpoint-path"
              - "/Volumes/${var.catalog}/bronze/_checkpoints/customer-updated"
