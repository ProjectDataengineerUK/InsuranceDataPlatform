name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply (dev)
        working-directory: terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
          TF_WORKSPACE: insurance-dev
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST_DEV }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN_DEV }}
          TF_VAR_environment: dev
          TF_VAR_confluent_bootstrap_servers: ${{ secrets.CONFLUENT_BOOTSTRAP_SERVERS }}
          TF_VAR_confluent_api_key: ${{ secrets.CONFLUENT_API_KEY }}
          TF_VAR_confluent_api_secret: ${{ secrets.CONFLUENT_API_SECRET }}
        run: |
          terraform init
          terraform apply -auto-approve

      - uses: databricks/setup-cli@main

      - name: Deploy bundle (dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: databricks bundle deploy -t dev

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply (prod)
        working-directory: terraform
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_CLOUD_TOKEN }}
          TF_WORKSPACE: insurance-prod
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST_PROD }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN_PROD }}
          TF_VAR_environment: prod
          TF_VAR_confluent_bootstrap_servers: ${{ secrets.CONFLUENT_BOOTSTRAP_SERVERS }}
          TF_VAR_confluent_api_key: ${{ secrets.CONFLUENT_API_KEY }}
          TF_VAR_confluent_api_secret: ${{ secrets.CONFLUENT_API_SECRET }}
        run: |
          terraform init
          terraform apply -auto-approve

      - uses: databricks/setup-cli@main

      - name: Deploy bundle (prod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: databricks bundle deploy -t prod
