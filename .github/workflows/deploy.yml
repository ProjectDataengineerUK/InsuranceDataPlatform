name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: terraform-deploy
  cancel-in-progress: false

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Restore Terraform state (dev)
        uses: actions/cache/restore@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-dev-${{ github.run_id }}
          restore-keys: |
            tfstate-dev-

      - name: Terraform apply (dev)
        working-directory: terraform
        env:
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST_DEV }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN_DEV }}
          TF_VAR_environment: dev
          TF_VAR_confluent_bootstrap_servers: ${{ secrets.CONFLUENT_BOOTSTRAP_SERVERS }}
          TF_VAR_confluent_api_key: ${{ secrets.CONFLUENT_API_KEY }}
          TF_VAR_confluent_api_secret: ${{ secrets.CONFLUENT_API_SECRET }}
          # Opcional — sem esse secret no GitHub, fica "" e secrets.tf não cria
          # o databricks_secret (var.sla_webhook_url != "" ? 1 : 0); sla_alerts.py
          # e model_drift.py já caem no fallback de log nesse caso.
          TF_VAR_sla_webhook_url: ${{ secrets.SLA_WEBHOOK_URL }}
          # Opcionais — Cloud API Key de CONTA (Metrics API, página Performance),
          # diferentes da API Key de CLUSTER acima. Sem esses secrets no GitHub,
          # ficam "" e a seção de consumer lag/partition skew no app mostra
          # "não configurado" (ver confluent_metrics.py::is_configured).
          TF_VAR_confluent_metrics_api_key: ${{ secrets.CONFLUENT_METRICS_API_KEY }}
          TF_VAR_confluent_metrics_api_secret: ${{ secrets.CONFLUENT_METRICS_API_SECRET }}
          TF_VAR_confluent_cluster_id: ${{ secrets.CONFLUENT_CLUSTER_ID }}
        run: |
          terraform init
          terraform import databricks_catalog.insurance "insurance_${TF_VAR_environment}" || true
          terraform apply -auto-approve

      - name: Save Terraform state (dev)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-dev-${{ github.run_id }}

      - uses: databricks/setup-cli@main

      - name: Deploy bundle (dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: databricks bundle deploy -t dev

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Restore Terraform state (prod)
        uses: actions/cache/restore@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-prod-${{ github.run_id }}
          restore-keys: |
            tfstate-prod-

      - name: Terraform apply (prod)
        working-directory: terraform
        env:
          # Mesmo workspace Databricks do dev — não há um workspace/PAT prod
          # separado neste projeto, só um catálogo Unity Catalog diferente
          # (insurance_prod via TF_VAR_environment).
          TF_VAR_databricks_host: ${{ secrets.DATABRICKS_HOST_DEV }}
          TF_VAR_databricks_token: ${{ secrets.DATABRICKS_TOKEN_DEV }}
          TF_VAR_environment: prod
          TF_VAR_confluent_bootstrap_servers: ${{ secrets.CONFLUENT_BOOTSTRAP_SERVERS }}
          TF_VAR_confluent_api_key: ${{ secrets.CONFLUENT_API_KEY }}
          TF_VAR_confluent_api_secret: ${{ secrets.CONFLUENT_API_SECRET }}
        run: |
          terraform init
          terraform import databricks_catalog.insurance "insurance_${TF_VAR_environment}" || true
          terraform apply -auto-approve

      - name: Save Terraform state (prod)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-prod-${{ github.run_id }}

      - name: Read SQL Warehouse ID (prod)
        id: warehouse
        working-directory: terraform
        run: echo "sql_warehouse_id=$(terraform output -raw sql_warehouse_id)" >> "$GITHUB_OUTPUT"

      - uses: databricks/setup-cli@main

      - name: Deploy bundle (prod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_DEV }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_DEV }}
        run: |
          databricks bundle deploy -t prod \
            --var="sql_warehouse_id=${{ steps.warehouse.outputs.sql_warehouse_id }}"
